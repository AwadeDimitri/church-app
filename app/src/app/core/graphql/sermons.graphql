query GetSermons($limit: Int = 10, $offset: Int = 0) {
  sermonsCollection(
    first: $limit
    offset: $offset
    orderBy: [{ published_at: DescNullsLast }]
  ) {
    edges {
      node {
        id
        title
        preacher_name
        audio_url
        video_url
        description
        duration
        published_at
        category: categories {
          id
          name
        }
      }
    }
  }
}

query GetSermonById($id: UUID!) {
  sermonsCollection(filter: { id: { eq: $id } }, first: 1) {
    edges {
      node {
        id
        title
        preacher_name
        audio_url
        video_url
        description
        duration
        published_at
        category: categories {
          id
          name
        }
      }
    }
  }
}

query GetSermonCategories {
  categoriesCollection(
    filter: { type: { eq: "sermon" } }
    orderBy: [{ name: AscNullsLast }]
  ) {
    edges {
      node {
        id
        name
      }
    }
  }
}
