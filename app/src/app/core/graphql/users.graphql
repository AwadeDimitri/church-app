query GetProfile($userId: UUID!) {
  usersCollection(filter: { id: { eq: $userId } }, first: 1) {
    edges {
      node {
        id
        full_name
        avatar_url
        role
        is_active
        created_at
      }
    }
  }
  sermons_count: sermonsCollection {
    totalCount
  }
  user_prayers_count: prayer_requestsCollection(
    filter: { author_id: { eq: $userId } }
  ) {
    totalCount
  }
}
