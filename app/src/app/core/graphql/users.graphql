query GetProfile($userId: uuid!) {
  users_by_pk(id: $userId) {
    id
    full_name
    email
    phone
    avatar_url
    role
    is_active
    created_at
  }
  sermons_count: sermons_aggregate {
    aggregate {
      count
    }
  }
  user_prayers_count: prayer_requests_aggregate(
    where: { author_id: { _eq: $userId } }
  ) {
    aggregate {
      count
    }
  }
}
