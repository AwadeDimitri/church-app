query GetBibleBooks {
  bible_books(order_by: { id: asc }) {
    id
    testament
    position
    name
    slug
    chapter_count
  }
}

query GetBibleChapter($bookId: smallint!, $chapter: smallint!) {
  bible_verses(
    where: { book_id: { _eq: $bookId }, chapter: { _eq: $chapter } }
    order_by: { verse: asc }
  ) {
    verse
    text
  }
}

query GetBibleVersesCount {
  bible_verses_aggregate {
    aggregate {
      count
    }
  }
}

query GetDailyVerse($offset: Int!) {
  bible_verses(
    order_by: [{ book_id: asc }, { chapter: asc }, { verse: asc }]
    limit: 1
    offset: $offset
  ) {
    book_id
    chapter
    verse
    text
  }
}
