query GetPrayerStats($userId: UUID!) {
  active: prayer_requestsCollection(filter: { is_answered: { eq: false } }) {
    totalCount
  }
  answered: prayer_requestsCollection(filter: { is_answered: { eq: true } }) {
    totalCount
  }
  mine: prayer_requestsCollection(filter: { author_id: { eq: $userId } }) {
    totalCount
  }
  intercessors: intercessors_count
}

query GetPrayerCategories {
  categoriesCollection(
    filter: { type: { eq: "prayer" } }
    orderBy: [{ name: AscNullsLast }]
  ) {
    edges {
      node {
        id
        slug
        name
        color
        description
      }
    }
  }
}

mutation CreatePrayerRequest(
  $content: String!
  $category_id: UUID!
  $is_anonymous: Boolean!
) {
  insertIntoprayer_requestsCollection(
    objects: [
      {
        content: $content
        category_id: $category_id
        is_anonymous: $is_anonymous
      }
    ]
  ) {
    records {
      id
      created_at
    }
  }
}

mutation LikePrayer($prayerId: UUID!) {
  insertIntoprayer_likesCollection(
    objects: [{ prayer_id: $prayerId }]
  ) {
    records {
      prayer_id
      user_id
    }
  }
}

mutation UnlikePrayer($prayerId: UUID!) {
  deleteFromprayer_likesCollection(
    filter: { prayer_id: { eq: $prayerId } }
  ) {
    records {
      prayer_id
    }
  }
}

mutation MarkPrayerAsAnswered($id: UUID!, $testimony: String!) {
  updateprayer_requestsCollection(
    set: { is_answered: true, testimony: $testimony }
    filter: { id: { eq: $id } }
  ) {
    records {
      id
      is_answered
      testimony
      answered_at
    }
  }
}
