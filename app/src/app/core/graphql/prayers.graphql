query GetPrayerRequests($userId: UUID!, $limit: Int = 10, $offset: Int = 0) {
  prayer_requestsCollection(
    first: $limit
    offset: $offset
    orderBy: [{ created_at: DescNullsLast }]
  ) {
    edges {
      node {
        id
        content
        is_anonymous
        is_answered
        testimony
        answered_at
        created_at
        category: categories {
          id
          slug
          name
          color
        }
        author: users {
          id
          full_name
        }
        likes: prayer_likesCollection {
          totalCount
        }
        my_likes: prayer_likesCollection(
          filter: { user_id: { eq: $userId } }
          first: 1
        ) {
          edges {
            node {
              user_id
            }
          }
        }
      }
    }
  }
}

