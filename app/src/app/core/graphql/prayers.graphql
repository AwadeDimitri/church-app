query GetPrayerRequests($userId: uuid!, $limit: Int = 20, $offset: Int = 0) {
  prayer_requests(limit: $limit, offset: $offset, order_by: { created_at: desc }) {
    id
    content
    is_anonymous
    is_answered
    created_at
    category {
      id
      slug
      name
      color
    }
    author {
      id
      full_name
    }
    likes_aggregate {
      aggregate {
        count
      }
    }
    my_likes: likes(where: { user_id: { _eq: $userId } }, limit: 1) {
      user_id
    }
  }
}

query GetMyPrayerRequests($userId: uuid!, $limit: Int = 50, $offset: Int = 0) {
  prayer_requests(
    where: { author_id: { _eq: $userId } }
    limit: $limit
    offset: $offset
    order_by: { created_at: desc }
  ) {
    id
    content
    is_anonymous
    is_answered
    created_at
    category {
      id
      slug
      name
      color
    }
    author {
      id
      full_name
    }
    likes_aggregate {
      aggregate {
        count
      }
    }
    my_likes: likes(where: { user_id: { _eq: $userId } }, limit: 1) {
      user_id
    }
  }
}

query GetPrayerStats {
  active: prayer_requests_aggregate(where: { is_answered: { _eq: false } }) {
    aggregate {
      count
    }
  }
  answered: prayer_requests_aggregate(where: { is_answered: { _eq: true } }) {
    aggregate {
      count
    }
  }
  intercessors: prayer_likes_aggregate {
    aggregate {
      count(columns: user_id, distinct: true)
    }
  }
}

query GetPrayerCategories {
  categories(where: { type: { _eq: "prayer" } }, order_by: { name: asc }) {
    id
    slug
    name
    color
    description
  }
}

mutation CreatePrayerRequest($content: String!, $category_id: uuid!, $is_anonymous: Boolean!) {
  insert_prayer_requests_one(object: {
    content: $content,
    category_id: $category_id,
    is_anonymous: $is_anonymous
  }) {
    id
    created_at
  }
}

mutation LikePrayer($prayerId: uuid!) {
  insert_prayer_likes_one(object: { prayer_id: $prayerId }) {
    prayer_id
    user_id
  }
}

mutation UnlikePrayer($prayerId: uuid!) {
  delete_prayer_likes(where: { prayer_id: { _eq: $prayerId } }) {
    affected_rows
  }
}
