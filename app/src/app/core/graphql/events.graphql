query GetEvents($limit: Int = 20, $offset: Int = 0) {
  eventsCollection(
    first: $limit
    offset: $offset
    orderBy: [{ starts_at: AscNullsLast }]
  ) {
    edges {
      node {
        id
        title
        description
        location
        cover_url
        starts_at
        ends_at
      }
    }
  }
}

query GetUpcomingEvents($now: Datetime!) {
  eventsCollection(
    filter: { starts_at: { gte: $now } }
    orderBy: [{ starts_at: AscNullsLast }]
    first: 5
  ) {
    edges {
      node {
        id
        title
        description
        location
        cover_url
        starts_at
        ends_at
      }
    }
  }
}
