query GetPosts($limit: Int = 20, $offset: Int = 0) {
  postsCollection(
    first: $limit
    offset: $offset
    orderBy: [{ created_at: DescNullsLast }]
  ) {
    edges {
      node {
        id
        title
        content
        category
        cover_url
        published_at
        created_at
      }
    }
  }
}
