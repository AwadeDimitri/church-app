<div class="px-5 safe-area-top">
  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-church-text">Prières</h1>
    <app-button variant="primary" size="sm">
      <nz-icon nzType="plus" nzTheme="outline" /> Demande
    </app-button>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-3 mb-6">
    @for (stat of stats; track stat.label) {
      <app-stat-card [value]="stat.value" [label]="stat.label" [color]="stat.color" />
    }
  </div>

  <!-- My Prayer -->
  <div class="bg-gradient-to-r from-church-blue-light to-blue-50 rounded-church p-5 mb-6">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-10 h-10 bg-church-blue rounded-full flex items-center justify-center">
        <nz-icon nzType="edit" nzTheme="outline" class="text-white" />
      </div>
      <div>
        <h3 class="font-semibold text-church-text">Partagez votre prière</h3>
        <p class="text-xs text-church-text-secondary">La communauté prie avec vous</p>
      </div>
    </div>
    <textarea
      placeholder="Écrivez votre sujet de prière..."
      rows="3"
      class="w-full bg-white rounded-xl p-3 text-sm border-none outline-none resize-none focus:ring-2 focus:ring-church-blue/20"
    ></textarea>
    <div class="flex justify-between items-center mt-3">
      <label class="flex items-center gap-2 text-xs text-church-text-secondary">
        <input type="checkbox" class="rounded accent-church-blue" />
        Anonyme
      </label>
      <app-button variant="primary">
        <nz-icon nzType="send" nzTheme="outline" /> Envoyer
      </app-button>
    </div>
  </div>

  <!-- Filter -->
  <app-category-filter [categories]="categories" [(selected)]="selectedCategory" />

  <!-- Prayer Requests -->
  <div class="flex flex-col gap-3 mb-8">
    @for (prayer of prayers; track prayer.author + prayer.date) {
      <app-prayer-card
        [author]="prayer.author"
        [content]="prayer.content"
        [date]="prayer.date"
        [category]="prayer.category"
        [prayerCount]="prayer.prayerCount"
        [isAnswered]="prayer.isAnswered"
        [avatarColor]="prayer.avatarColor"
        [categoryColor]="prayer.categoryColor" />
    }
  </div>
</div>
