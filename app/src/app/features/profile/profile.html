<div class="px-5 safe-area-top">
  <div class="text-center mb-6">
    <div class="w-fit mx-auto mb-3">
      @if (displayName(); as name) {
        <app-avatar [name]="name" size="lg" />
      } @else {
        <app-avatar name="?" size="lg" />
      }
    </div>
    <h2 class="text-xl font-bold text-church-text">{{ displayName() || '—' }}</h2>
    <p class="text-sm text-church-text-secondary">{{ memberSince() }}</p>
  </div>

  <div class="grid grid-cols-2 gap-3 mb-6">
    <app-stat-card [value]="stats().sermons" label="Sermons" color="text-church-blue" size="sm" />
    <app-stat-card [value]="stats().prayers" label="Prières" color="text-church-gold" size="sm" />
  </div>

  <div class="bg-white rounded-church-sm shadow-church-card mb-4 overflow-hidden">
    @for (item of mainMenu; track item.icon; let isLast = $last) {
      <app-menu-item
        [icon]="item.icon"
        [label]="item.label"
        [bgClass]="item.bgClass"
        [iconColor]="item.iconColor"
        [last]="isLast"
        (action)="navigate(item.route)" />
    }
  </div>

  <div class="bg-white rounded-church-sm shadow-church-card mb-4 overflow-hidden">
    <app-menu-item
      icon="logout"
      label="Déconnexion"
      bgClass="bg-church-red-light"
      iconColor="text-church-red"
      labelColor="text-church-red"
      [showArrow]="false"
      [last]="true"
      (action)="signOut()" />
  </div>
</div>
