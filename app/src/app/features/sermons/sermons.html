<div class="px-5 safe-area-top">
  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-church-text">Sermons</h1>
    <app-button variant="icon" ariaLabel="Filtrer">
      <nz-icon nzType="filter" nzTheme="outline" class="text-church-text" />
    </app-button>
  </div>

  <!-- Search -->
  <div class="relative mb-5">
    <nz-icon nzType="search" nzTheme="outline" class="absolute left-4 top-1/2 -translate-y-1/2 text-church-text-secondary" />
    <input
      type="text"
      placeholder="Rechercher un sermon..."
      class="w-full bg-white rounded-full pl-11 pr-4 py-3 text-sm shadow-church-card border-none outline-none focus:ring-2 focus:ring-church-blue/20"
    />
  </div>

  <!-- Category Filter -->
  <app-category-filter [categories]="categories" [(selected)]="selectedCategory" />

  <!-- Featured Sermon -->
  <div class="bg-gradient-to-br from-church-blue to-church-blue-dark rounded-church p-5 mb-6 text-white relative overflow-hidden">
    <div class="absolute bottom-0 right-0 w-40 h-40 bg-white/5 rounded-full translate-y-1/2 translate-x-1/4"></div>
    <span class="text-[10px] font-bold uppercase tracking-wider bg-church-gold text-white px-2 py-0.5 rounded-full">À la une</span>
    <h3 class="text-lg font-bold mt-3 mb-1">Les promesses de Dieu</h3>
    <p class="text-sm text-white/70 mb-1">Pasteur Jean-Marc</p>
    <div class="flex items-center gap-3 text-xs text-white/60 mb-4">
      <span class="flex items-center gap-1">
        <nz-icon nzType="clock-circle" nzTheme="outline" /> 52 min
      </span>
      <span>6 Avril 2026</span>
    </div>
    <app-button variant="secondary">
      <nz-icon nzType="play-circle" nzTheme="outline" /> Écouter
    </app-button>
  </div>

  <!-- Sermon List -->
  <div class="flex flex-col gap-3 mb-8">
    @for (sermon of sermons; track sermon.title) {
      <app-sermon-card
        [title]="sermon.title"
        [speaker]="sermon.speaker"
        [duration]="sermon.duration"
        [tag]="sermon.tag"
        [color]="sermon.color"
        [showPlayButton]="true" />
    }
  </div>
</div>
