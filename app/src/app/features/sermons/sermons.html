<div class="px-5 safe-area-top">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-church-text">Sermons</h1>
  </div>

  <!-- Search -->
  <div class="relative mb-5">
    <nz-icon nzType="search" nzTheme="outline" class="absolute left-4 top-1/2 -translate-y-1/2 text-church-text-secondary" />
    <input
      type="text"
      placeholder="Rechercher un sermon..."
      (input)="searchQuery.set($any($event.target).value)"
      class="w-full bg-white rounded-full pl-11 pr-4 py-3 text-sm shadow-church-card border-none outline-none focus:ring-2 focus:ring-church-blue/20"
    />
  </div>

  <!-- Category Filter -->
  <app-category-filter [categories]="categories()" [(selected)]="selectedCategory" />

  <!-- Loading -->
  @if (loading()) {
    <div class="flex flex-col items-center justify-center py-16">
      <nz-icon nzType="clock-circle" nzTheme="outline" class="text-4xl text-church-blue animate-pulse mb-3" />
      <p class="text-sm text-church-text-secondary">Chargement des sermons...</p>
    </div>
  }

  <!-- Error -->
  @if (error(); as err) {
    <div class="bg-red-50 rounded-church-sm p-5 text-center">
      <nz-icon nzType="info-circle" nzTheme="outline" class="text-2xl text-church-red mb-2" />
      <p class="text-sm text-church-red">{{ err }}</p>
    </div>
  }

  <!-- Content -->
  @if (!loading() && !error()) {
    <!-- Featured Sermon -->
    @if (featured(); as sermon) {
      <button (click)="openSermon(sermon.id)" class="w-full text-left bg-gradient-to-br from-church-blue to-church-blue-dark rounded-church p-5 mb-6 text-white relative overflow-hidden z-0">
        <div class="absolute bottom-0 right-0 w-40 h-40 bg-white/5 rounded-full translate-y-1/2 translate-x-8 pointer-events-none"></div>
        <span class="text-[10px] font-bold uppercase tracking-wider bg-church-gold text-white px-2 py-0.5 rounded-full">À la une</span>
        <h3 class="text-lg font-bold mt-3 mb-1">{{ sermon.title }}</h3>
        <p class="text-sm text-white/70 mb-1">{{ sermon.preacher_name }}</p>
        <div class="flex items-center gap-3 text-xs text-white/60 mb-4">
          @if (sermon.duration) {
            <span class="flex items-center gap-1">
              <nz-icon nzType="clock-circle" nzTheme="outline" /> {{ sermon.duration }} min
            </span>
          }
          @if (sermon.published_at) {
            <span>{{ sermon.published_at | date:'d MMMM yyyy' }}</span>
          }
        </div>
        <div class="inline-flex items-center gap-2 bg-white/20 rounded-full px-4 py-2 text-sm font-medium">
          <nz-icon nzType="play-circle" nzTheme="outline" /> Écouter
        </div>
      </button>
    }

    <!-- Empty state -->
    @if (sermons().length === 0) {
      <div class="flex flex-col items-center justify-center py-16">
        <nz-icon nzType="sound" nzTheme="outline" class="text-4xl text-church-text-secondary mb-3" />
        <p class="text-sm text-church-text-secondary">Aucun sermon disponible pour le moment.</p>
      </div>
    }

    <!-- Sermon List -->
    <div class="flex flex-col gap-3 mb-8 mt-6">
      @for (sermon of sermons(); track sermon.id) {
        <app-sermon-card
          [title]="sermon.title"
          [speaker]="sermon.preacher_name"
          [duration]="sermon.duration ?? 0"
          [date]="(sermon.published_at | date:'d MMM yyyy') ?? ''"
          [showPlayButton]="true"
          (play)="openSermon(sermon.id)" />
      }
    </div>
  }
</div>
